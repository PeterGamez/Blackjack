name: CI Check & Build

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    if: contains(github.event.pull_request.labels.*.name, 'ready to merge')
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    name: Backend Checks & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Format Backend
        run: bun run format
      - name: Verify Backend Formatting
        run: git diff --exit-code
      - name: Build Backend
        run: bun run build

  frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    name: Frontend Checks & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Lint Frontend
        run: bun run lint
      - name: Format Frontend
        run: bun run format
      - name: Verify Frontend Formatting
        run: git diff --exit-code
      - name: Build Frontend
        run: bun run build